<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Supreme Court Survival Scrollytelling</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="page-header">
    <div class="page-inner">
      <h1>Supreme Court Survival Rate Explainer</h1>
      <p class="intro">text tk</p>
    </div>
  </header>

  <main class="scrolly">
    <div class="scrolly-inner">
      <aside class="figure-column">
        <div class="sticky-figure">
          <div class="figure-header">
            <div id="figureSummary" class="summary-box"></div>
          </div>
          <div id="figureChart" class="chart-shell"></div>
          <div id="figureHint" class="figure-hint"></div>
        </div>
      </aside>

      <section class="text-column" id="steps"></section>
    </div>
  </main>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
